<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Internal - SD Negeri 01 Botumoito</title>
    
    <!-- Mengambil font Poppins dari Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ========================================================
           CSS VARIABLES (Sistem Desain Premium)
           ======================================================== */
        :root {
            --primary: #0b2a5b;     /* Biru Tua */
            --secondary: #1e4fa3;   /* Biru Medium */
            --accent: #f4c542;      /* Kuning Emas */
            
            --transition-smooth: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ========================================================
           RESET & GLOBAL STYLES
           ======================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #020813;
            /* Menggunakan gambar sekolah dengan overlay gelap kebiruan */
            background-image: 
                linear-gradient(rgba(2, 8, 19, 0.75), rgba(11, 42, 91, 0.85)), 
                url('https://i.ibb.co.com/S4M8gv1r/Sekolah.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow: hidden; /* Mencegah scroll karena animasi background */
            color: #ffffff; /* Teks default menjadi putih */
        }

        /* ========================================================
           ANIMATED BACKGROUND (Glowing Orbs)
           ======================================================== */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.45; /* Opacity diturunkan sedikit agar foto sekolah lebih jelas */
            animation: orbFloat 15s infinite alternate ease-in-out;
            pointer-events: none;
        }

        .orb-1 {
            width: 400px; height: 400px;
            background: var(--primary);
            top: -100px; left: -100px;
            animation-duration: 18s;
        }

        .orb-2 {
            width: 350px; height: 350px;
            background: var(--accent);
            bottom: -50px; right: -50px;
            animation-duration: 22s;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px; height: 300px;
            background: var(--secondary);
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 25s;
            animation-delay: -10s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-40px, 30px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* Overlay Dot Grid Halus */
        body::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 24px 24px;
            z-index: 1;
            pointer-events: none;
        }

        /* ========================================================
           CARD LAYOUT (Authentic Dark Glassmorphism)
           ======================================================== */
        .portal-card {
            background: rgba(255, 255, 255, 0.03); /* Transparan ekstrem */
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            
            /* Border 3D Kaca */
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.3);
            
            width: 100%;
            max-width: 480px;
            border-radius: 28px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.6), 
                inset 0 0 20px rgba(255, 255, 255, 0.05);
            
            position: relative;
            z-index: 2; /* Di atas animasi orbs */
            padding: 45px 35px 40px;
            text-align: center;
        }

        /* ========================================================
           HEADER & TYPOGRAPHY
           ======================================================== */
        .logo-container {
            width: 95px;
            height: 95px;
            background: #ffffff; /* Bantalan putih agar logo terlihat jelas */
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3), 0 0 0 5px rgba(255,255,255,0.1);
            padding: 12px;
            opacity: 0;
            animation: fadeSlideUp 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        .logo {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent) 0%, #d4a017 100%);
            color: #000;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 6px 18px;
            border-radius: 50px;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(244, 197, 66, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0;
            animation: fadeSlideUp 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) 0.1s forwards;
        }

        .portal-title {
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            opacity: 0;
            animation: fadeSlideUp 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) 0.2s forwards;
        }

        .portal-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            font-weight: 400;
            margin-bottom: 35px;
            opacity: 0;
            animation: fadeSlideUp 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) 0.3s forwards;
        }

        /* ========================================================
           LINKS / BUTTONS (Glass App Style)
           ======================================================== */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-item {
            display: flex;
            align-items: center;
            text-decoration: none;
            /* Latar tombol kaca */
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            padding: 12px 18px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1rem;
            transition: var(--transition-smooth);
            text-align: left;
            position: relative;
            
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            
            opacity: 0;
            animation: fadeSlideUp 0.7s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        .link-item:nth-child(1) { animation-delay: 0.4s; }
        .link-item:nth-child(2) { animation-delay: 0.45s; }
        .link-item:nth-child(3) { animation-delay: 0.5s; }
        .link-item:nth-child(4) { animation-delay: 0.55s; }
        .link-item:nth-child(5) { animation-delay: 0.6s; }
        .link-item:nth-child(6) { animation-delay: 0.65s; }

        .link-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 1.35rem;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.15);
            transition: var(--transition-smooth);
        }

        .link-text {
            flex-grow: 1;
            letter-spacing: 0.3px;
        }

        .link-arrow {
            color: rgba(255,255,255,0.3);
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
        }

        /* Hover Effect Super Premium */
        .link-item:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(11, 42, 91, 0.8); /* Berubah jadi warna Primary Sekolah */
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.3), 0 0 20px rgba(11, 42, 91, 0.5);
            border-color: var(--accent); /* Pinggiran menyala emas */
        }

        .link-item:hover .link-icon {
            transform: scale(1.15) rotate(5deg);
            background: rgba(255, 255, 255, 0.2);
        }

        .link-item:hover .link-arrow {
            color: var(--accent);
            transform: translateX(5px);
        }

        /* ========================================================
           FOOTER
           ======================================================== */
        .portal-footer {
            margin-top: 35px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 500;
            
            opacity: 0;
            animation: fadeSlideUp 0.7s cubic-bezier(0.25, 0.8, 0.25, 1) 0.8s forwards;
        }

        .footer-note {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .portal-footer svg {
            color: var(--accent);
            opacity: 0.8;
        }

        .copyright {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* ========================================================
           ANIMATIONS
           ======================================================== */
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ========================================================
           RESPONSIVE DESIGN
           ======================================================== */
        @media (max-width: 480px) {
            .portal-card {
                padding: 40px 25px 30px;
                border-radius: 24px;
            }
            .portal-title { font-size: 1.4rem; }

            .link-icon { width: 40px; height: 40px; font-size: 1.2rem; margin-right: 14px;}
        }
    </style>
</head>
